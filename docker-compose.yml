version: '3.8'

services:
  kafka-broker:
    image: apache/kafka:latest
    container_name: kafka-broker
    ports:
      - "9092:9092"   # Host communication (Postman, IDEs)
      - "29092:29092" # Container communication (Java backend container)
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller

      # Define your listeners
      KAFKA_LISTENERS: DEPLOYED_CONTAINERS://0.0.0.0:29092,LOCAL_HOST://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: DEPLOYED_CONTAINERS://kafka-broker:29092,LOCAL_HOST://host.docker.internal:9092

      # FIXED: Explicitly define the inter-broker listener name matching your new config
      KAFKA_INTER_BROKER_LISTENER_NAME: DEPLOYED_CONTAINERS

      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,DEPLOYED_CONTAINERS:PLAINTEXT,LOCAL_HOST:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_LOG_DIRS: /tmp/kraft-combined-logs
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    networks:
      - product-network

networks:
  product-network:
    external: true
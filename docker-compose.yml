version: '3.8'

services:
  kafka-broker:
    image: apache/kafka:latest
    container_name: kafka-broker
    ports:
      - "9092:9092"   # Host communication (Postman, IDEs)
      - "29092:29092" # Container communication (Java backend container)
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller

      # Define three listeners: DOCKER, HOST, and CONTROLLER
      KAFKA_LISTENERS: DEPLOYED_CONTAINERS://0.0.0.0:29092,LOCAL_HOST://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093

      # EXPLANATION FOR ADVERTISED LISTENERS:
      # 1. Containers inside "product-network" talk to 'kafka-broker:29092'
      # 2. Tools outside Docker (Postman/Local code) talk to 'host.docker.internal:9092'
      KAFKA_ADVERTISED_LISTENERS: DEPLOYED_CONTAINERS://kafka-broker:29092,LOCAL_HOST://host.docker.internal:9092

      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,DEPLOYED_CONTAINERS:PLAINTEXT,LOCAL_HOST:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_LOG_DIRS: /tmp/kraft-combined-logs
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    networks:
      - product-network

# FIXED NETWORK BLOCK: Tells compose exactly where to find 'product-network'
networks:
  product-network:
    external: true